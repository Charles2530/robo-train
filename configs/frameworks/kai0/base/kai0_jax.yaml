launcher:
  type: jax
  command: scripts/train.py
  source_root: /data/buaa/code/djy/kai0
  python_bin: .venv/bin/python
  fallback_python_bins:
    - /opt/conda/bin/python

train:
  algorithm: kai0_openpi_compat
  batch_size: 256
  num_workers: 8
  num_train_steps: 50000
  log_interval: 100
  save_interval: 5000
  keep_period: 5000
  fsdp_devices: 1
  overwrite: true
  resume: false
  wandb_enabled: false

checkpoint:
  params_path: checkpoints/kai0/kai0-base/pi05_base/params

env:
  CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
  FFMPEG_HOME: /usr/local/ffmpeg
  CONDA_LIB_PATH: /opt/conda/lib
  JAX_PLATFORMS: cuda
  OPENPI_VIDEO_BACKEND: torchcodec
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.9"
