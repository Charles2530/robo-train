defaults:
  - ../../../base/model/pi05.yaml
  - ../../../datasets/robochallenge_table30v2/aloha_dual_arm.yaml
  - ../base/kai0_jax.yaml

profile:
  config_name: pi05_put_the_books_back_table30v2
  script_name: train_put_the_books_back_table30v2.sh
  task: put_the_books_back_table30v2
  run_name: run1-put-books-back-table30v2-50000step-8card-bs256
  description: Kai0 Table30v2 put-books-back EEF action profile.

data:
  dataset_path: datasets/RoboChallenge_Table30v2_v2.1_pyav_g2/put_the_books_back
  default_prompt: Place the books back onto the bookshelf.
  task_family: put_the_books_back

action:
  representation: eef_pose_quaternion
  action_dim: 16
  control_mode: absolute
  use_next_state_as_action: false
  use_delta_joint_actions: false
  label_source: action

train:
  wandb_enabled: true
