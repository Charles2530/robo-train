defaults:
  - ../../../base/model/pi05.yaml
  - ../../../datasets/robochallenge_table30/arx5_single_arm.yaml
  - ../base/kai0_jax.yaml

profile:
  config_name: pi05_arrange_flowers
  script_name: train_arrange_flowers_encode.sh
  task: arrange_flowers_encode
  run_name: run1-arrange-flowers-encode-50000step-8card-bs256
  description: Kai0 arrange-flowers encode helper profile.

data:
  dataset_path: datasets/RoboChallenge_Table30_v2.1_pyav_g2/arrange_flowers
  required_subdir: videos
  default_prompt: insert the three flowers on the table into the vase one by one
  task_family: arrange_flowers

action:
  representation: eef_pose
  action_dim: 7
  control_mode: absolute
  use_next_state_as_action: false
  use_delta_joint_actions: false
  label_source: action

encode:
  variants:
    - pyav
    - torchcodec
    - sparse
