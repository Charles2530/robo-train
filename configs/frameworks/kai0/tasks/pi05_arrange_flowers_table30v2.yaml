defaults:
  - ../../../base/model/pi05.yaml
  - ../../../datasets/robochallenge_table30v2/arx5_single_arm.yaml
  - ../base/kai0_jax.yaml

profile:
  config_name: pi05_arrange_flowers_table30v2
  script_name: train_arrange_flowers_table30v2.sh
  task: arrange_flowers_table30v2
  run_name: run1-arrange-flowers-table30v2-50000step-8card-bs256
  description: Kai0 Table30v2 arrange-flowers profile.

data:
  dataset_path: datasets/RoboChallenge_Table30v2_v2.1_pyav_g2/arrange_flowers
  default_prompt: Put the 4 flowers into the vase.
  task_family: arrange_flowers

action:
  representation: eef_pose_quaternion
  action_dim: 8
  control_mode: absolute
  use_next_state_as_action: false
  use_delta_joint_actions: false
  label_source: action

train:
  wandb_enabled: true
